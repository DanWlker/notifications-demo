<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>WebSocket Demo</title>
    <style>
      body {
        font-family: monospace;
        padding: 2rem;
        background: #111;
        color: #eee;
      }
      h2 {
        color: #7cf;
      }
      .box {
        border: 1px solid #444;
        padding: 1rem;
        margin: 1rem 0;
        border-radius: 6px;
      }
      .log {
        height: 200px;
        overflow-y: auto;
        background: #1a1a1a;
        padding: 0.5rem;
        font-size: 0.85rem;
      }
      .log p {
        margin: 2px 0;
      }
      .snapshot {
        color: #7fc;
      }
      .update {
        color: #fc7;
      }
      .reconnect {
        color: #f77;
      }
      button {
        margin: 0.25rem;
        padding: 0.4rem 1rem;
        background: #333;
        color: #eee;
        border: 1px solid #555;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #444;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 1rem;
      }
      th,
      td {
        padding: 0.5rem 1rem;
        border: 1px solid #444;
        text-align: left;
      }
      th {
        background: #222;
        color: #7cf;
      }
      tr:nth-child(even) {
        background: #1a1a1a;
      }
      .status-pending {
        color: #fc7;
        font-weight: bold;
      }
      .status-ready {
        color: #7fc;
        font-weight: bold;
      }
    </style>
    <script src="/ws-client.js"></script>
  </head>
  <body>
    <script>
      let ws = null;

      function log(msg, cls) {
        const el = document.getElementById("ws-log");
        const p = document.createElement("p");
        p.className = cls || "";
        p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        el.appendChild(p);
        el.scrollTop = el.scrollHeight;
      }

      function renderTable(rows) {
        const tbody = document.getElementById("ws-tbody");
        tbody.innerHTML = "";
        for (const row of rows) {
          const tr = document.createElement("tr");
          tr.id = `row-${row.id}`;
          tr.innerHTML = `
					<td>${row.id}</td>
					<td>${row.name}</td>
					<td class="status-${row.status}">${row.status}</td>
					`;
          tbody.appendChild(tr);
        }
      }

      function updateRow(id, status) {
        const tr = document.getElementById(`row-${id}`);
        if (!tr) return;
        const td = tr.querySelector("td:last-child");
        td.className = `status-${status}`;
        td.textContent = status;
      }

      function connect() {
        if (ws) ws.close();
        log("Connecting...", "reconnect");
        ws = new WebSocket(`ws://${location.host}`);

        ws.addEventListener("open", () => {
          log("Connected", "reconnect");
        });

        ws.addEventListener("message", (e) => {
          const { id, type, data } = JSON.parse(e.data);
          if (type === "snapshot") {
            renderTable(data);
            log(`SNAPSHOT received: ${data.length} rows`, "snapshot");
          } else if (type === "update") {
            updateRow(data.id, data.status);
            log(`UPDATE id=${id}: row ${data.id} → ${data.status}`, "update");
          }
        });

        ws.addEventListener("close", () => {
          log("Connection closed", "reconnect");
        });

        ws.addEventListener("error", () => {
          log("WebSocket error", "reconnect");
        });
      }

      function disconnect() {
        if (ws) {
          ws.close();
          ws = null;
          log("Disconnected manually", "reconnect");
        }
      }
    </script>
    <h1>WebSocket Demo</h1>

    <div class="box">
      <h2>Order Status</h2>
      <p>Server pushes a full snapshot on connect, then cycles row statuses every 3s.</p>
      <button onclick="connect()">Connect</button>
      <button onclick="disconnect()">Disconnect</button>
      <table id="ws-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="ws-tbody">
          <tr>
            <td colspan="3" style="color: #777">(not connected)</td>
          </tr>
        </tbody>
      </table>
      <div class="log" id="ws-log"></div>
    </div>
  </body>
</html>

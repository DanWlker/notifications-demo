<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GraphQL-WS React Demo</title>
    <style>
      body {
        font-family: monospace;
        padding: 2rem;
        background: #111;
        color: #eee;
      }
      h2 {
        color: #7cf;
      }
      .box {
        border: 1px solid #444;
        padding: 1rem;
        margin: 1rem 0;
        border-radius: 6px;
      }
      .log {
        height: 200px;
        overflow-y: auto;
        background: #1a1a1a;
        padding: 0.5rem;
        font-size: 0.85rem;
      }
      .log p {
        margin: 2px 0;
      }
      .snapshot {
        color: #7fc;
      }
      .update {
        color: #fc7;
      }
      .reconnect {
        color: #f77;
      }
      button {
        margin: 0.25rem;
        padding: 0.4rem 1rem;
        background: #333;
        color: #eee;
        border: 1px solid #555;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #444;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 1rem;
      }
      th,
      td {
        padding: 0.5rem 1rem;
        border: 1px solid #444;
        text-align: left;
      }
      th {
        background: #222;
        color: #7cf;
      }
      tr:nth-child(even) {
        background: #1a1a1a;
      }
      .status-pending {
        color: #fc7;
        font-weight: bold;
      }
      .status-ready {
        color: #7fc;
        font-weight: bold;
      }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/graphql-ws/umd/graphql-ws.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script src="/gql-ws-react-client.js" type="text/babel"></script>
  </body>
</html>
